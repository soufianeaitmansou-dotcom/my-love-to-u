<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love</title>

<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        color: white;
    }

    .card {
        background: rgba(255, 255, 255, 0.15);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        max-width: 500px;
    }

    h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
    }

    p {
        font-size: 1.2em;
        line-height: 1.6;
    }

    button {
        margin-top: 20px;
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        background: white;
        color: #ff6b81;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff6b81;
        color: white;
    }
</style>
</head>

<body>

<div class="card">
    <h1>To my little cute baby squirrel❤️</h1>
    <p>
        FI love u so much my dear
      you have a special place in my heart
      and i wanna be with u, kiss to u my dear
    </p>
    <button onclick="showMessage()">Click Me</button>
    <div id="loveMessage" style="opacity:0; margin-top:20px; transition: opacity 1s ease; font-weight:bold;">
          i love u ya the cutest thing alive.
    </div>
</div>

<script>
function showMessage() {
    const message = document.getElementById('loveMessage');
    message.style.opacity = "1";
}
</script>

</body>
</html>
